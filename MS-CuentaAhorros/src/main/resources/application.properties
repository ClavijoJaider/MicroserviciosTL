spring.application.name=backendUnificado
server.port=8080

# ==============================================================
# Oracle - UNICA conexion del backend unificado.
# Tanto CUENTA_AHORROS (maestro) como MOVIMIENTO (detalle) viven aqui.
# ==============================================================
spring.datasource.url=jdbc:oracle:thin:@//192.168.18.4:1521/ORCL
spring.datasource.username=DAE2026
spring.datasource.password=DAE2026
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# ==============================================================
# JPA / Hibernate - una sola unidad de persistencia para ambas entidades.
# ddl-auto=update -> Hibernate crea/actualiza CUENTA_AHORROS, MOVIMIENTO
#                    y la secuencia SEQ_MOVIMIENTO automaticamente.
# ==============================================================
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ==============================================================
# MVC / SSE / Errores
# ==============================================================
server.error.include-message=always
server.error.include-binding-errors=always
spring.mvc.async.request-timeout=-1

# CORS global - el cliente Electron corre fuera del navegador con axios.
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
