spring.application.name=movimientoService
server.port=8081

# ==============================================================
# BASE DE DATOS — H2 archivo compartido con MS-CuentaAhorros
# AUTO_SERVER=TRUE permite que ambas JVM accedan al mismo archivo
# IMPORTANTE: iniciar MS-CuentaAhorros (8080) primero.
# ==============================================================
spring.datasource.url=jdbc:h2:file:/tmp/waybank;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Consola H2 (solo desarrollo): http://localhost:8081/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==============================================================
# JPA / Hibernate
# none: MS-CuentaAhorros (8080) es el dueno del esquema.
#       Este microservicio solo usa las tablas ya creadas.
# ==============================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==============================================================
# MVC / SSE / Errores
# ==============================================================
server.error.include-message=always
server.error.include-binding-errors=always
spring.mvc.async.request-timeout=-1

# URL del microservicio maestro (CuentaAhorros)
microservicio.cuentas.url=http://localhost:8080

# CORS global
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
