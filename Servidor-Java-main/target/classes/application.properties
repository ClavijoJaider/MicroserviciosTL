spring.application.name=proyectoMicroservicios
server.port=8080

# ==============================================================
# BASE DE DATOS — H2 embebida (desarrollo por defecto)
# Para Oracle: ejecutar con -Dspring.profiles.active=oracle
# ==============================================================
spring.datasource.url=jdbc:h2:file:/tmp/waybank;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Consola H2 (solo desarrollo): http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==============================================================
# JPA / Hibernate
# ==============================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==============================================================
# MVC / SSE / Errores
# ==============================================================
server.error.include-message=always
server.error.include-binding-errors=always
spring.mvc.async.request-timeout=-1

# CORS global
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
