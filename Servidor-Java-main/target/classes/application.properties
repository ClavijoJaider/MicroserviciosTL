spring.application.name=proyectoMicroservicios
server.port=8080

# Mensajes de error detallados
server.error.include-message=always
server.error.include-binding-errors=always

# Sin timeout para SSE (Observer en servidor)
spring.mvc.async.request-timeout=-1

# Jackson: fechas como cadena, no como timestamp
spring.jackson.deserialization.FAIL_ON_NULL_FOR_PRIMITIVES=false
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# CORS global (también configurado en @CrossOrigin del controlador)
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# ==============================================================
# ORACLE / JPA — Preparado para conectar a Oracle XE
# ==============================================================
# ESTADO ACTUAL: Oracle DESACTIVADO (sin Oracle instalado, el servidor
# sigue funcionando con almacenamiento en memoria).
#
# PARA ACTIVAR ORACLE:
#   1. Descomenta las 5 líneas de spring.datasource.* y spring.jpa.*
#   2. Elimina (o comenta) la línea spring.autoconfigure.exclude de abajo
#   3. Asegúrate de que Oracle XE esté corriendo en localhost:1521
#   4. Crea el esquema con usuario DAE2026 / contraseña DAE2026
#
# spring.datasource.url=jdbc:oracle:thin:@localhost:1521:XE
# spring.datasource.username=DAE2026
# spring.datasource.password=DAE2026
# spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
# spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
# spring.jpa.hibernate.ddl-auto=update
# spring.jpa.show-sql=true

# Deshabilita la autoconfiguración de JPA/DataSource cuando Oracle no está activo
# (permite que el servidor arranque normalmente en modo en memoria)
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration
