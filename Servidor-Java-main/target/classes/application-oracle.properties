# ==============================================================
# PERFIL ORACLE — activar con: -Dspring.profiles.active=oracle
# Requiere Oracle XE corriendo en localhost:1521
# Usuario/contraseña: DAE2026 / DAE2026
# ==============================================================

spring.datasource.url=jdbc:oracle:thin:@localhost:1521:XE
spring.datasource.username=DAE2026
spring.datasource.password=DAE2026
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console deshabilitada en Oracle
spring.h2.console.enabled=false
