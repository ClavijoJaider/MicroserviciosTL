<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Buscar Transacción</title>
  <style>
    body { font-family: Arial; background: #F4F6FA; padding: 20px; }
    h2 { color: #1F4E79; margin-bottom: 15px; }
    label { display: block; margin: 8px 0 3px; font-weight: bold; font-size: 13px; }
    input { padding: 7px; border: 1px solid #ccc; border-radius: 3px; box-sizing: border-box; }
    .fila { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 8px; }
    .fila .campo { display: flex; flex-direction: column; }
    button { background: #1F4E79; color: white; padding: 8px 16px; border: none; cursor: pointer; border-radius: 3px; }
    button:hover { background: #2E6BAA; }
    button.sec { background: #666; }
    #resultado {
      display: none;
      margin-top: 18px;
      background: #EBF2FF;
      border: 1px solid #90CAF9;
      border-radius: 6px;
      padding: 14px 18px;
      font-size: 13px;
    }
    #resultado table { width: 100%; border-collapse: collapse; margin-top: 6px; }
    #resultado td { padding: 5px 8px; border-bottom: 1px solid #ccc; }
    #resultado td:first-child { font-weight: bold; color: #555; width: 40%; }
    .credito { color: #1B8A5A; font-weight: bold; }
    .debito  { color: #C9102F; font-weight: bold; }
    .error   { color: #C9102F; margin-top: 8px; font-size: 12px; }
    .ok      { color: #1B8A5A; font-weight: bold; }
    #notif   { min-height: 18px; font-size: 12px; color: #1B8A5A; margin-bottom: 6px; }
  </style>
</head>
<body>
  <h2>🔍 Buscar Transacción</h2>

  <div class="fila">
    <div class="campo">
      <label for="numeroCuenta">N° de cuenta:</label>
      <input type="number" id="numeroCuenta" placeholder="Ej: 1001" style="width:130px">
    </div>
    <div class="campo">
      <label for="idMovimiento">ID del movimiento:</label>
      <input type="number" id="idMovimiento" placeholder="Ej: 5" style="width:130px">
    </div>
    <button onclick="buscar()">Buscar</button>
    <button class="sec" onclick="limpiar()">Limpiar</button>
  </div>

  <p id="errMsg" class="error"></p>
  <div id="notif"></div>

  <div id="resultado">
    <strong>Detalle del movimiento:</strong>
    <table>
      <tr><td>ID</td><td id="rId"></td></tr>
      <tr><td>N° de cuenta</td><td id="rCuenta"></td></tr>
      <tr><td>Tipo</td><td id="rTipo"></td></tr>
      <tr><td>Monto</td><td id="rMonto"></td></tr>
      <tr><td>Fecha</td><td id="rFecha"></td></tr>
    </table>
  </div>

  <script>
    async function buscar() {
      const errMsg  = document.getElementById('errMsg');
      const res     = document.getElementById('resultado');
      errMsg.textContent = '';
      res.style.display  = 'none';

      const nRaw  = document.getElementById('numeroCuenta').value.trim();
      const idRaw = document.getElementById('idMovimiento').value.trim();

      if (!nRaw || isNaN(parseInt(nRaw)) || parseInt(nRaw) <= 0) {
        errMsg.textContent = '✗ Ingrese un número de cuenta válido'; return;
      }
      if (!idRaw || isNaN(parseInt(idRaw)) || parseInt(idRaw) <= 0) {
        errMsg.textContent = '✗ Ingrese un ID de movimiento válido'; return;
      }

      const numeroCuenta = parseInt(nRaw);
      const id           = parseInt(idRaw);

      try {
        // Llama a GET /movimientos/{id} — el numeroCuenta se ignora en la URL del servidor
        // pero se pasa para registro y posibles validaciones futuras.
        const r = await window.api.buscarMovimiento(numeroCuenta, id);

        if (r.success && r.data) {
          const m    = r.data;
          const tipo = m.tipo === 'CREDITO' ? 'credito' : 'debito';
          const simbolo = m.tipo === 'CREDITO' ? '+' : '-';
          const fecha = m.fechaMovimiento
            ? new Date(m.fechaMovimiento).toLocaleString('es-CO')
            : '-';

          document.getElementById('rId').textContent      = m.id;
          document.getElementById('rCuenta').textContent  = m.numeroCuenta;
          document.getElementById('rTipo').innerHTML      = `<span class="${tipo}">${m.tipo}</span>`;
          document.getElementById('rMonto').innerHTML     =
            `<span class="${tipo}">${simbolo}$${Number(m.monto).toLocaleString('es-CO')}</span>`;
          document.getElementById('rFecha').textContent   = fecha;

          res.style.display = 'block';
        } else {
          errMsg.textContent = '✗ ' + (r.error || 'Movimiento no encontrado');
        }
      } catch (e) {
        errMsg.textContent = '✗ Error al conectar con el servidor: ' + e.message;
      }
    }

    function limpiar() {
      document.getElementById('numeroCuenta').value = '';
      document.getElementById('idMovimiento').value = '';
      document.getElementById('errMsg').textContent  = '';
      document.getElementById('resultado').style.display = 'none';
      document.getElementById('notif').textContent  = '';
    }

    // ============== OBSERVER PATTERN ==============
    // Recibe eventos SSE de MS-Movimiento (8081) en tiempo real.
    // Si el movimiento que estamos viendo fue modificado o eliminado,
    // mostramos una notificación.
    window.api.onActualizacion((evt) => {
      const idBuscado = parseInt(document.getElementById('idMovimiento').value);
      const notif     = document.getElementById('notif');

      if (evt.evento === 'MOVIMIENTO_ACTUALIZADO' && evt.datos && evt.datos.id === idBuscado) {
        notif.textContent = '● Este movimiento fue actualizado — vuelva a buscar para ver los cambios.';
        setTimeout(() => { notif.textContent = ''; }, 5000);
      } else if (evt.evento === 'MOVIMIENTO_ELIMINADO' && evt.datos && evt.datos.id === idBuscado) {
        notif.textContent = '● Este movimiento fue eliminado.';
        document.getElementById('resultado').style.display = 'none';
      }
    });
  </script>
</body>
</html>
